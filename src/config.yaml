site:
  name: TrendTrack Promo Code
  site: 'https://trendtrackpromocode.com/'
  base: '/'
  trailingSlash: true

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata
metadata:
  title:
    default: 'TrendTrack Promo Code: WINNING – Get 20% OFF Discount in 2026'
    template: '%s — TrendTrack Promo'
  description: "Verified TrendTrack Promo Code WINNING gives you 20% OFF all plans in June 2026. Save on the #1 ecommerce analytics platform with our tested discount code."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: TrendTrack Promo Code
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@trendtrackpromocode'
    site: '@trendtrackpromocode'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: 'G-ELY2G4MP7T'

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
